upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # User uploads can be large (audio/video). 100M cap.
    client_max_body_size 100M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files — served directly with long cache.
    location /static/ {
        alias /srv/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files — nginx supports HTTP Range natively, so audio/video
    # scrubbing works without going through Django.
    location /media/ {
        alias /srv/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Everything else → gunicorn.
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
    }
}
