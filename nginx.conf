upstream django {
    server web:8000;
    keepalive 32;
}

# Per-IP rate limits. Burst+nodelay lets short bumps through; sustained
# floods get 503'd.
limit_req_zone $binary_remote_addr zone=auth:10m  rate=5r/m;
limit_req_zone $binary_remote_addr zone=write:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=read:10m  rate=20r/s;

# Cache for /static/ — small in-memory map of open file descriptors.
open_file_cache          max=2000 inactive=5m;
open_file_cache_valid    2m;
open_file_cache_min_uses 2;
open_file_cache_errors   on;

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;
    client_body_timeout  60s;
    keepalive_timeout    65;

    # Compression — text assets only, no double-compressing JPEG/MP3/MP4.
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/xml application/xml application/xml+rss
        application/json application/javascript application/x-javascript
        text/javascript image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Health endpoint — bypass rate limits, no logs.
    location = /healthz/ {
        proxy_pass http://django;
        access_log off;
    }

    # Static — long cache, no proxy hop.
    location /static/ {
        alias /srv/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media — nginx supports HTTP Range natively (audio/video scrub).
    location /media/ {
        alias /srv/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Throttle login + register: 5 attempts/min, burst 5.
    location ~ ^/accounts/(login|register)/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://django;
        include /etc/nginx/conf.d/proxy.inc;
    }

    # Throttle write paths (POST forms).
    location ~ ^/(wall|messages|friends|photos|video|audio|groups|feed)/ {
        limit_req zone=write burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://django;
        include /etc/nginx/conf.d/proxy.inc;
    }

    # Default: read traffic, gentler limit.
    location / {
        limit_req zone=read burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://django;
        include /etc/nginx/conf.d/proxy.inc;
    }
}
