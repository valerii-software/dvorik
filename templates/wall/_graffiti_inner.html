<h1 style="margin-top:0">{{ title }}</h1>

<div class="graffiti-toolbar">
  <div class="palette" id="palette">
    <button type="button" class="swatch active" data-color="#000000" style="background:#000000"></button>
    <button type="button" class="swatch" data-color="#FFFFFF" style="background:#FFFFFF"></button>
    <button type="button" class="swatch" data-color="#E03131" style="background:#E03131"></button>
    <button type="button" class="swatch" data-color="#F08C00" style="background:#F08C00"></button>
    <button type="button" class="swatch" data-color="#F5C518" style="background:#F5C518"></button>
    <button type="button" class="swatch" data-color="#2F9E44" style="background:#2F9E44"></button>
    <button type="button" class="swatch" data-color="#1971C2" style="background:#1971C2"></button>
    <button type="button" class="swatch" data-color="#7048E8" style="background:#7048E8"></button>
    <button type="button" class="swatch" data-color="#C92A86" style="background:#C92A86"></button>
    <button type="button" class="swatch" data-color="#5C3A1E" style="background:#5C3A1E"></button>
  </div>

  <div class="brushes" id="brushes">
    <button type="button" class="brush" data-size="2"><span style="width:2px;height:2px"></span></button>
    <button type="button" class="brush active" data-size="4"><span style="width:4px;height:4px"></span></button>
    <button type="button" class="brush" data-size="8"><span style="width:8px;height:8px"></span></button>
    <button type="button" class="brush" data-size="14"><span style="width:14px;height:14px"></span></button>
  </div>

  <button type="button" class="btn" id="clear-btn">Очистить</button>
</div>

<canvas id="graffiti" width="586" height="408"></canvas>

<form method="post" action="{{ save_url }}" id="save-form" hx-boost="false" style="margin-top:10px">
  {% csrf_token %}
  <input type="hidden" name="image_data" id="image-data">
  <button class="btn btn-primary" type="submit">Сохранить на стену</button>
  &nbsp;<a href="#" data-modal-close>Отмена</a>
</form>

<script>
(function () {
  const canvas = document.getElementById('graffiti');
  if (!canvas || canvas.dataset.inited) return;
  canvas.dataset.inited = '1';
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  let color = '#000000';
  let size = 4;
  let drawing = false;
  let lastX = 0, lastY = 0;

  function pos(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return { x: x * canvas.width / rect.width, y: y * canvas.height / rect.height };
  }
  function start(e) {
    e.preventDefault();
    drawing = true;
    const p = pos(e); lastX = p.x; lastY = p.y;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(lastX, lastY, size / 2, 0, Math.PI * 2); ctx.fill();
  }
  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = pos(e);
    ctx.strokeStyle = color; ctx.lineWidth = size;
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
    lastX = p.x; lastY = p.y;
  }
  function stop() { drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', stop);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', stop);

  document.getElementById('palette').addEventListener('click', function (e) {
    const t = e.target.closest('.swatch');
    if (!t) return;
    document.querySelectorAll('#palette .swatch').forEach(s => s.classList.remove('active'));
    t.classList.add('active');
    color = t.dataset.color;
  });
  document.getElementById('brushes').addEventListener('click', function (e) {
    const t = e.target.closest('.brush');
    if (!t) return;
    document.querySelectorAll('#brushes .brush').forEach(s => s.classList.remove('active'));
    t.classList.add('active');
    size = parseInt(t.dataset.size, 10);
  });
  document.getElementById('clear-btn').addEventListener('click', function () {
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  });
  document.getElementById('save-form').addEventListener('submit', function () {
    document.getElementById('image-data').value = canvas.toDataURL('image/png');
  });
})();
</script>
