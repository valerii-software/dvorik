{% extends 'base.html' %}
{% block title %}Загрузить аудиозапись — ВКонтакте{% endblock %}

{% block content %}
<h1>Загрузить аудиозапись</h1>

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {% for field in form %}
    <div class="form-row">
      <label>{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<div class="err">{{ field.errors|join:', ' }}</div>{% endif %}
    </div>
  {% endfor %}
  <div class="form-row">
    <label></label>
    <button class="btn btn-primary" type="submit">Загрузить</button>
    &nbsp;<a href="{% url 'audio:my_audio' %}">Отмена</a>
  </div>
</form>
{% endblock %}
