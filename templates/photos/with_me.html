{% extends 'base.html' %}
{% block title %}Фото со мной — ВКонтакте{% endblock %}

{% block content %}
<h1>Фото со мной</h1>

{% if tags %}
  <div class="photo-grid">
    {% for t in tags %}
      <a class="photo-thumb" href="{% url 'photos:photo' t.photo.id %}">
        <img src="{{ t.photo.thumbnail.url|default:t.photo.image.url }}" alt="">
      </a>
    {% endfor %}
  </div>
{% else %}
  <div class="empty">Вас пока никто не отметил на фотографиях.</div>
{% endif %}
{% endblock %}
