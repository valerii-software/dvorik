{% extends 'base.html' %}
{% block title %}Вход — ВКонтакте{% endblock %}
{% block anon_content %}
<div class="auth-card">
  <h1>Вход на сайт</h1>
  {% if error %}<div class="form-error">{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <label>Эл. почта</label>
      <input type="email" name="email" value="{{ form.email.value|default:'' }}" autofocus>
    </div>
    <div class="form-row">
      <label>Пароль</label>
      <input type="password" name="password">
    </div>
    <div class="form-row">
      <label></label>
      <button class="btn btn-primary" type="submit">Войти</button>
      &nbsp;<a href="{% url 'accounts:register' %}">Регистрация</a>
    </div>
  </form>
</div>
<div class="auth-hint">
  Регистрируясь, вы соглашаетесь не делиться странички с друзьями за пределами сайта.
</div>
{% endblock %}
