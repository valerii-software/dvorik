{% extends 'base.html' %}
{% block title %}Приватность — ВКонтакте{% endblock %}

{% block content %}
<h1>Приватность</h1>

<div class="muted" style="margin-bottom:10px">
  <a href="{% url 'profiles:edit' %}">Профиль</a> · <b>Приватность</b>
</div>

<form method="post">
  {% csrf_token %}
  {% for field in form %}
    <div class="form-row">
      <label>{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<div class="err">{{ field.errors|join:', ' }}</div>{% endif %}
    </div>
  {% endfor %}
  <div class="form-row">
    <label></label>
    <button class="btn btn-primary" type="submit">Сохранить</button>
    &nbsp;<a href="{% url 'profiles:my_page' %}">К моей странице</a>
  </div>
</form>
{% endblock %}
