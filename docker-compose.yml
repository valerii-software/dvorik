services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dvorik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dvorik}
      POSTGRES_DB: ${POSTGRES_DB:-dvorik}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build: .
    environment:
      DJANGO_SETTINGS_MODULE: dvorik.settings
      DATABASE_URL: postgres://${POSTGRES_USER:-dvorik}:${POSTGRES_PASSWORD:-dvorik}@db:5432/${POSTGRES_DB:-dvorik}
      DEBUG: '0'
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    depends_on:
      - db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/srv/static:ro
      - media:/srv/media:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  staticfiles:
  media:
